<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="description" content="Antalavera Arquitectura — Gestión profesional de obras y reuniones">
  <meta name="theme-color" content="#29b6c8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Antalavera">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>Antalavera Arquitectura</title>
  <link rel="stylesheet" href="assets/app.css">
  <script>
    // Limpiar Service Worker y caches antiguos al cargar
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
    }
    if ('caches' in window) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <!-- Logo Antalavera: A + rectángulos corporativos -->
      <div class="logo-icon">
        <svg width="38" height="38" viewBox="0 0 38 38">
          <!-- Fondo oscuro -->
          <rect width="38" height="38" rx="4" fill="#161718"/>
          <!-- Rectángulo amarillo -->
          <rect x="13" y="4" width="14" height="11" fill="none" stroke="#f5c518" stroke-width="1.2"/>
          <!-- Rectángulo rojo -->
          <rect x="8" y="9" width="14" height="14" fill="none" stroke="#c8302a" stroke-width="1.2"/>
          <!-- Rectángulo azul -->
          <rect x="16" y="18" width="14" height="12" fill="none" stroke="#2859a8" stroke-width="1.2"/>
          <!-- Círculo construcción -->
          <circle cx="19" cy="18" r="10" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" stroke-dasharray="2,2"/>
          <!-- A -->
          <text x="19" y="26" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="18" font-weight="800" fill="white">A</text>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">Antal<span>A</span>vera</div>
        <div class="logo-sub">arquitectura</div>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle">‹</button>
    </div>

    <div class="nav">
      <div class="nav-section">Principal</div>
      <button class="nav-item" data-view="dashboard">
        <span class="nav-icon">🏠</span><span class="nav-label">Panel de control</span>
      </button>
      <button class="nav-item" data-view="projects">
        <span class="nav-icon">🏗️</span><span class="nav-label">Proyectos / Obras</span>
      </button>
      <button class="nav-item" data-view="calendar">
        <span class="nav-icon">📅</span><span class="nav-label">Calendario</span>
      </button>
      <div class="nav-section" style="margin-top:10px">Gestión</div>
      <button class="nav-item" data-view="agents">
        <span class="nav-icon">👥</span><span class="nav-label">Agentes LOE</span>
      </button>
      <button class="nav-item" data-view="perfil">
        <span class="nav-icon">🏛️</span><span class="nav-label">Perfil del estudio</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <button class="nav-item" id="install-btn" style="display:none;color:var(--cyan);border:1px solid rgba(41,182,200,.25);border-radius:6px;margin:3px 0">
        <span class="nav-icon">📲</span><span class="nav-label">Instalar app</span>
      </button>
      <div id="drive-sidebar-status" style="font-size:10px;padding:6px 2px;color:rgba(255,255,255,.25);font-family:var(--mono)">☁️ Drive: no conectado</div>
      <div style="font-size:9px;color:rgba(255,255,255,.12);padding:2px 2px;font-family:var(--mono)">ANTALAVERA ARQ. v2.0</div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="btn btn-ghost btn-icon" id="mobile-menu-btn" style="display:none">☰</button>
      <div class="topbar-title" id="topbar-title">Panel de control</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="main-content">
      <div style="display:flex;align-items:center;justify-content:center;height:200px">
        <div style="text-align:center;color:var(--text3)">
          <div style="font-size:32px;margin-bottom:8px">⏳</div>
          <div style="font-family:var(--font-cond);letter-spacing:.1em;text-transform:uppercase">Iniciando...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="assets/db.js"></script>
<script src="assets/geo.js"></script>
<script src="assets/dxf-viewer.js"></script>
<script src="assets/firma.js"></script>
<script src="assets/drive-estudio.js"></script>
<script src="assets/drive-sync.js"></script>
<script src="assets/sync.js"></script>
<script src="assets/app.js"></script>
<script src="assets/app-ext.js"></script>
<script src="assets/brand-init.js"></script>
<script src="assets/notificaciones.js"></script>
  <script src="assets/transcripcion.js"></script>
  <script src="assets/drive-fix.js"></script>
<script>
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  if(window.innerWidth<=768) document.getElementById('mobile-menu-btn').style.display='flex';
  if(window.location.hash.includes('access_token')&&window.opener) window.close();
</script>
</body>
</html>
